name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/jobalert-ia
            git pull origin main
            docker build -t jobalert-ia .
            docker stop jobalert-ia || true
            docker rm jobalert-ia || true
            docker run -d --name jobalert-ia \
              --restart unless-stopped \
              --env-file /opt/jobalert-ia/.env \
              -p 8080:8000 \
              jobalert-ia \
              uvicorn main:app --host 0.0.0.0 --port 8000
            docker stop jobalert-orchestrateur 2>/dev/null || true
            docker rm jobalert-orchestrateur 2>/dev/null || true
            docker run -d --name jobalert-orchestrateur \
              --restart unless-stopped \
              --env-file /opt/jobalert-ia/.env \
              jobalert-ia python 5_orchestrateur.py
            echo "Deploy OK"
